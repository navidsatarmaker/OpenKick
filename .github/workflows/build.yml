name: Build OpenKick

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - 'Website/**'
      - '*.md'
  pull_request:
    branches: [ "main", "master" ]
    paths-ignore:
      - 'Website/**'
      - '*.md'

jobs:
  build-windows:
    name: Build Windows VST3
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B build

    - name: Build Release
      run: cmake --build build --config Release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenKick-Windows
        path: build/OpenKick_artefacts/Release/VST3
